# Personal-site API services only. TLS + routing live in the host's shared
# edge proxy (the `edge` repo), which serves api.hamzamerzic.info from the
# fragment installed by deploy.sh. These containers expose nothing on the
# host; the edge reaches them by alias on the external edge-personal network.
name: personal-api

services:
  ikfast:
    build:
      context: ../ikfast
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      edge-personal:
        aliases:
          - ikfast

  robot-link-info:
    build:
      context: ../robot_link_info
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      edge-personal:
        aliases:
          - robot-link-info

  mesh-cleaner:
    build:
      context: ../mesh_cleaner
    restart: unless-stopped
    expose:
      - "8080"
    tmpfs:
      - /tmp/uploads:size=512M
      - /tmp/results:size=512M
    networks:
      edge-personal:
        aliases:
          - mesh-cleaner

networks:
  edge-personal:
    name: edge-personal
    external: true
